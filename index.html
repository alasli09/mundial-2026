<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 Colombia - Calendario TV</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="trophy">🏆</span>
                    <span class="title">Mundial 2026</span>
                </div>
                <nav class="nav-tabs">
                    <button class="nav-btn active" data-tab="calendario">📅 Calendario</button>
                    <button class="nav-btn" data-tab="mis-favoritos">⭐ Mis Favoritos</button>
                    <button class="nav-btn" data-tab="analisis">📊 Análisis TV</button>
                </nav>
            </div>
        </header>

        <section id="calendario" class="main-content active">
            <div class="filter-bar">
                <div class="search-container">
                    <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar equipo, grupo o ciudad...">
                    <button class="btn-clear-search" id="btn-clear-search" style="display: none;">✕</button>
                </div>
                
                <div class="quick-filters">
                    <button class="filter-chip active" data-filter="todos">Todos</button>
                    <button class="filter-chip" data-filter="favoritos">⭐ Favoritos</button>
                    <button class="filter-chip" data-filter="oficina">💼 En Oficina</button>
                    <button class="filter-chip" data-filter="casa">🏠 En Casa</button>
                    <button class="btn-icon-filter" id="btn-filtros-avanzados">
                        <span class="icon">⚙️</span> Filtros
                    </button>
                </div>
            </div>

            <div class="date-navigator">
                <button class="nav-date-btn" id="prev-date">◀</button>
                <div class="current-date-info">
                    <h2 id="current-date-display">11 de junio</h2>
                    <p id="current-day-label">Jueves - Día 1</p>
                </div>
                <button class="nav-date-btn" id="next-date">▶</button>
            </div>

            <div class="matches-timeline" id="matches-timeline">
                </div>
        </section>

        <section id="mis-favoritos" class="main-content">
            <div class="section-header">
                <h2>Mis Selecciones Favoritas</h2>
                <p>Selecciona los equipos que quieres seguir de cerca</p>
            </div>
            <div class="teams-selector-grid" id="teams-selector">
                </div>
        </section>

        <section id="analisis" class="main-content">
            <div class="section-header">
                <h2>Análisis de Cobertura TV</h2>
                <p>Estadísticas de canales para tus equipos favoritos</p>
            </div>
            <div id="analisis-container">
                </div>
        </section>
    </div>

    <div class="modal" id="modal-filtros">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Filtros Avanzados</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="filtro-grupo">
                    <h4>📅 Rango de Fechas</h4>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <div style="flex: 1;">
                            <label style="font-size: 12px; color: var(--text-secondary);">Desde:</label>
                            <input type="date" id="filtro-fecha-desde" class="search-input" value="2026-06-11">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 12px; color: var(--text-secondary);">Hasta:</label>
                            <input type="date" id="filtro-fecha-hasta" class="search-input" value="2026-07-19">
                        </div>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <h4>🏆 Fases del Torneo</h4>
                    <div class="filtro-options" id="filtro-fases">
                        <label class="checkbox-label"><input type="checkbox" value="grupos" data-grupo="fases"> Fase de Grupos</label>
                        <label class="checkbox-label"><input type="checkbox" value="octavos" data-grupo="fases"> Octavos de Final</label>
                        <label class="checkbox-label"><input type="checkbox" value="cuartos" data-grupo="fases"> Cuartos de Final</label>
                        <label class="checkbox-label"><input type="checkbox" value="semis" data-grupo="fases"> Semifinales</label>
                        <label class="checkbox-label"><input type="checkbox" value="finales" data-grupo="fases"> Final y 3er Puesto</label>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <h4>💼 Disponibilidad</h4>
                    <div class="filtro-options" id="filtro-disponibilidad">
                        <label class="checkbox-label"><input type="checkbox" value="oficina" data-grupo="disponibilidad"> 💼 En Oficina (Horario laboral)</label>
                        <label class="checkbox-label"><input type="checkbox" value="casa" data-grupo="disponibilidad"> 🏠 En Casa (Tiempo libre)</label>
                        <label class="checkbox-label"><input type="checkbox" value="sueño" data-grupo="disponibilidad"> 🌙 Horas de sueño</label>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <h4>📺 Canales de TV</h4>
                    <div class="filtro-options" id="filtro-canales">
                        <label class="checkbox-label"><input type="checkbox" value="caracol" data-grupo="canales"> 📺 Caracol</label>
                        <label class="checkbox-label"><input type="checkbox" value="winsports" data-grupo="canales"> 📺 Win Sports+</label>
                        <label class="checkbox-label"><input type="checkbox" value="directv" data-grupo="canales"> 📺 DirecTV</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="limpiar-filtros">Limpiar filtros</button>
                <button class="btn-primary" id="aplicar-filtros">Ver partidos</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
